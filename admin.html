<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DareDan Circle｜管理者ページ</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; font-size: 14px; background: #f8f0f5; min-height: 100vh; }

#login-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.login-card { background: #fff; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; position: relative; z-index: 10; }
.login-logo { font-family: "Great Vibes", cursive; font-size: 36px; color: #222; margin-bottom: 6px; }
.login-sub { font-size: 12px; color: #aaa; margin-bottom: 24px; }
.flabel { font-size: 11px; color: #888; text-align: left; margin-bottom: 4px; display: block; }
.finput { width: 100%; border: 1px solid #e0e0e0; border-radius: 8px; padding: 11px 14px; font-size: 14px; margin-bottom: 14px; }
.login-btn { background: linear-gradient(90deg, #f857a6, #ff5f57, #ffbe00); color: #fff; border: none; border-radius: 32px; padding: 13px; font-size: 14px; cursor: pointer; width: 100%; font-weight: bold; position: relative; z-index: 10; }
.errmsg { color: #e05a30; font-size: 12px; margin-top: 10px; }

#admin-section { display: none; max-width: 500px; margin: 0 auto; padding: 24px 16px; }
.admin-logo { font-family: "Great Vibes", cursive; font-size: 32px; color: #222; text-align: center; margin-bottom: 4px; }
.admin-sub { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 24px; }

.card { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.card h2 { font-size: 15px; font-weight: bold; color: #222; margin-bottom: 16px; }
.sec-label { font-size: 12px; color: #aaa; margin-bottom: 8px; }

.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.cal-nav { background: none; border: 1px solid #eee; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 16px; }
.cal-month-label { font-size: 14px; font-weight: bold; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-lbl { text-align: center; font-size: 11px; color: #aaa; padding: 3px 0; }
.cal-day { text-align: center; padding: 7px 2px; border-radius: 8px; font-size: 13px; cursor: pointer; }
.cal-day:hover { background: #fff0f8; }
.cal-day.sel { background: linear-gradient(90deg,#f857a6,#ff5f57); color: #fff; font-weight: bold; }
.cal-day.tod { border: 1px solid #e05a9a; color: #e05a9a; }
.cal-empty { padding: 7px 2px; }

.time-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.tbtn { border: 1px solid #eee; border-radius: 8px; padding: 8px 2px; font-size: 12px; text-align: center; cursor: pointer; background: #fafafa; }
.tbtn:hover { border-color: #e05a9a; color: #e05a9a; }
.tbtn.sel { background: linear-gradient(90deg,#f857a6,#ff5f57); color: #fff; border-color: transparent; }

.place-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.pbtn { border: 1px solid #eee; border-radius: 8px; padding: 10px 6px; font-size: 13px; text-align: center; cursor: pointer; background: #fafafa; }
.pbtn:hover { border-color: #e05a9a; color: #e05a9a; }
.pbtn.sel { background: linear-gradient(90deg,#f857a6,#ff5f57); color: #fff; border-color: transparent; }

.other-input { width: 100%; border: 1px solid #eee; border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-top: 8px; display: none; }

.summary { font-size: 12px; color: #aaa; margin: 8px 0; min-height: 18px; }

.add-btn { width: 100%; background: linear-gradient(90deg,#f857a6,#ff5f57,#ffbe00); color: #fff; border: none; border-radius: 32px; padding: 13px; font-size: 14px; font-weight: bold; cursor: pointer; }
.add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.lesson-list { display: flex; flex-direction: column; gap: 10px; }
.lesson-row { display: flex; align-items: center; justify-content: space-between; background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 12px 14px; }
.lesson-info { font-size: 13px; line-height: 1.7; }
.lesson-date { font-weight: bold; color: #e05a9a; }
.delbtn { background: none; border: 1px solid #ffcccc; border-radius: 8px; color: #e05a30; font-size: 12px; padding: 4px 10px; cursor: pointer; }

.pub-btn { width: 100%; background: #222; color: #fff; border: none; border-radius: 32px; padding: 13px; font-size: 14px; font-weight: bold; cursor: pointer; }
.pub-btn:disabled { opacity: 0.4; }
.pub-status { text-align: center; font-size: 13px; margin-top: 10px; min-height: 20px; }
.ok { color: #0a7a50; } .ng { color: #e05a30; }

.logout-btn { width: 100%; background: #fff; color: #888; border: 1px solid #ddd; border-radius: 32px; padding: 10px; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>

<div id="login-section">
  <div class="login-card">
    <div class="login-logo">DareDan Circle</div>
    <div class="login-sub">管理者ページ</div>
    <label class="flabel">パスワード</label>
    <input class="finput" type="password" id="pw" placeholder="パスワード" />
    <label class="flabel">GitHubトークン</label>
    <input class="finput" type="password" id="tok" placeholder="ghp_..." />
    <button class="login-btn" id="login-btn">ログイン</button>
    <div class="errmsg" id="errmsg"></div>
  </div>
</div>

<div id="admin-section">
  <div class="admin-logo">DareDan Circle</div>
  <div class="admin-sub">⚙️ 管理者ページ</div>

  <div class="card">
    <h2>📅 レッスンを追加する</h2>
    <div class="sec-label">① 日付を選択</div>
    <div class="cal-header">
      <button class="cal-nav" id="prev-btn">‹</button>
      <div class="cal-month-label" id="cal-month-label"></div>
      <button class="cal-nav" id="next-btn">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>

    <div class="sec-label" style="margin-top:16px;">② 時間帯を選択</div>
    <div class="time-grid" id="time-grid"></div>

    <div class="sec-label" style="margin-top:16px;">③ 場所を選択</div>
    <div class="place-grid">
      <div class="pbtn" id="p0">金沢総体</div>
      <div class="pbtn" id="p1">憩いの家</div>
      <div class="pbtn" id="p2">額谷ふれあい</div>
      <div class="pbtn" id="p3">その他</div>
    </div>
    <input class="other-input" id="other-input" type="text" placeholder="場所を入力" />

    <div class="summary" id="summary"></div>
    <button class="add-btn" id="add-btn" disabled>＋ レッスンを追加</button>
  </div>

  <div class="card">
    <h2>📋 登録済みレッスン <span id="count" style="font-size:12px;color:#aaa;font-weight:normal;"></span></h2>
    <div class="lesson-list" id="lesson-list">
      <div style="font-size:13px;color:#ccc;text-align:center;padding:20px;">まだ登録されていません</div>
    </div>
  </div>

  <div class="card">
    <h2>🌐 サイトに公開する</h2>
    <p style="font-size:12px;color:#888;margin-bottom:16px;">「公開する」を押すとお客さんサイトに即時反映されます</p>
    <button class="pub-btn" id="pub-btn">🚀 公開する</button>
    <div class="pub-status" id="pub-status"></div>
  </div>

  <button class="logout-btn" id="logout-btn">ログアウト</button>
</div>

<script>
var PASS = 'daredan2933';
var REPO = 'daredan2933/daredan-circle';
var FILE = 'schedule.json';
var TOKEN = '';
var selDate = null, selTime = null, selPlace = null;
var lessons = [];
var curY, curM;
var placeNames = ['金沢総体','憩いの家','額谷ふれあい','その他'];

// ログイン
document.getElementById('login-btn').addEventListener('click', function() {
  var pw = document.getElementById('pw').value;
  var tok = document.getElementById('tok').value.trim();
  var err = document.getElementById('errmsg');
  if (pw !== PASS) { err.textContent = '❌ パスワードが違います'; return; }
  if (!tok.startsWith('ghp_') && !tok.startsWith('github_pat_')) { err.textContent = '❌ トークンが正しくありません'; return; }
  TOKEN = tok;
  err.textContent = '';
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('admin-section').style.display = 'block';
  init();
});

// ログアウト
document.getElementById('logout-btn').addEventListener('click', function() {
  TOKEN = '';
  document.getElementById('login-section').style.display = 'flex';
  document.getElementById('admin-section').style.display = 'none';
  document.getElementById('pw').value = '';
  document.getElementById('tok').value = '';
});

// カレンダー
document.getElementById('prev-btn').addEventListener('click', function() { curM--; if(curM<0){curM=11;curY--;} renderCal(); });
document.getElementById('next-btn').addEventListener('click', function() { curM++; if(curM>11){curM=0;curY++;} renderCal(); });

function init() {
  var now = new Date();
  curY = now.getFullYear(); curM = now.getMonth();
  renderCal();
  renderTimes();
  setupPlaces();
  loadLessons();
}

function renderCal() {
  var months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-month-label').textContent = curY + '年 ' + months[curM];
  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['日','月','火','水','木','金','土'].forEach(function(l) {
    var d = document.createElement('div'); d.className = 'cal-lbl'; d.textContent = l; grid.appendChild(d);
  });
  var first = new Date(curY, curM, 1).getDay();
  var last = new Date(curY, curM+1, 0).getDate();
  var today = new Date();
  for (var i=0; i<first; i++) { var e=document.createElement('div'); e.className='cal-empty'; grid.appendChild(e); }
  for (var d=1; d<=last; d++) {
    (function(day) {
      var el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = day;
      var ds = curY+'-'+pad(curM+1)+'-'+pad(day);
      if (today.getFullYear()===curY && today.getMonth()===curM && today.getDate()===day) el.classList.add('tod');
      if (selDate===ds) el.classList.add('sel');
      el.addEventListener('click', function() {
        selDate = ds;
        document.querySelectorAll('.cal-day').forEach(function(x){x.classList.remove('sel');});
        el.classList.add('sel');
        updateSummary();
      });
      grid.appendChild(el);
    })(d);
  }
}

function pad(n) { return n<10?'0'+n:String(n); }

function renderTimes() {
  var grid = document.getElementById('time-grid');
  grid.innerHTML = '';
  for (var h=10; h<=23; h++) {
    (function(hour) {
      var btn = document.createElement('div');
      btn.className = 'tbtn';
      btn.textContent = hour+':00';
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('sel');});
        btn.classList.add('sel');
        selTime = hour+':00';
        updateSummary();
      });
      grid.appendChild(btn);
    })(h);
  }
}

function setupPlaces() {
  placeNames.forEach(function(name, i) {
    document.getElementById('p'+i).addEventListener('click', function() {
      document.querySelectorAll('.pbtn').forEach(function(b){b.classList.remove('sel');});
      document.getElementById('p'+i).classList.add('sel');
      var oi = document.getElementById('other-input');
      if (name === 'その他') {
        oi.style.display = 'block';
        selPlace = oi.value || null;
      } else {
        oi.style.display = 'none';
        selPlace = name;
      }
      updateSummary();
    });
  });
  document.getElementById('other-input').addEventListener('input', function() {
    selPlace = this.value || null;
    updateSummary();
  });
}

function updateSummary() {
  var ok = selDate && selTime && selPlace;
  document.getElementById('add-btn').disabled = !ok;
  document.getElementById('summary').textContent = ok ? '選択中：'+selDate+' '+selTime+' '+selPlace : '';
}

document.getElementById('add-btn').addEventListener('click', function() {
  if (!selDate||!selTime||!selPlace) return;
  lessons.push({date:selDate, time:selTime, place:selPlace});
  lessons.sort(function(a,b){return (a.date+a.time)>(b.date+b.time)?1:-1;});
  selDate=null; selTime=null; selPlace=null;
  document.querySelectorAll('.cal-day').forEach(function(x){x.classList.remove('sel');});
  document.querySelectorAll('.tbtn').forEach(function(x){x.classList.remove('sel');});
  document.querySelectorAll('.pbtn').forEach(function(x){x.classList.remove('sel');});
  document.getElementById('other-input').style.display='none';
  document.getElementById('other-input').value='';
  document.getElementById('summary').textContent='';
  document.getElementById('add-btn').disabled=true;
  renderLessons();
});

function renderLessons() {
  var list = document.getElementById('lesson-list');
  document.getElementById('count').textContent = '('+lessons.length+'件)';
  if (!lessons.length) { list.innerHTML='<div style="font-size:13px;color:#ccc;text-align:center;padding:20px;">まだ登録されていません</div>'; return; }
  var days=['日','月','火','水','木','金','土'];
  list.innerHTML = lessons.map(function(l,i){
    var d=new Date(l.date+'T00:00:00'); var w=days[d.getDay()];
    var p=l.date.split('-');
    return '<div class="lesson-row"><div class="lesson-info"><span class="lesson-date">'+parseInt(p[1])+'月'+parseInt(p[2])+'日（'+w+'）</span><br>'+l.time+'　📍 '+l.place+'</div><button class="delbtn" onclick="delLesson('+i+')">削除</button></div>';
  }).join('');
}

function delLesson(i) { lessons.splice(i,1); renderLessons(); }

async function loadLessons() {
  try {
    var res = await fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE, {
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    if (res.ok) {
      var data = await res.json();
      var content = JSON.parse(atob(data.content.split('\n').join('')));
      lessons = content.lessons || [];
      renderLessons();
    }
  } catch(e) {}
}

document.getElementById('pub-btn').addEventListener('click', async function() {
  var btn = document.getElementById('pub-btn');
  var status = document.getElementById('pub-status');
  btn.disabled = true;
  status.textContent = '公開中...';
  status.className = 'pub-status';
  try {
    var sha = null;
    var gr = await fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE, {
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    if (gr.ok) { var gd=await gr.json(); sha=gd.sha; }
    var content = btoa(unescape(encodeURIComponent(JSON.stringify({lessons:lessons},null,2))));
    var body = {message:'スケジュール更新', content:content};
    if (sha) body.sha = sha;
    var pr = await fetch('https://api.github.com/repos/'+REPO+'/contents/'+FILE, {
      method:'PUT',
      headers:{'Authorization':'token '+TOKEN,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body:JSON.stringify(body)
    });
    if (pr.ok) { status.textContent='✅ 公開しました！'; status.className='pub-status ok'; }
    else { throw new Error(); }
  } catch(e) { status.textContent='❌ 失敗しました。もう一度お試しください。'; status.className='pub-status ng'; }
  btn.disabled = false;
});
</script>
</body>
</html>
