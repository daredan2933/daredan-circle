<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DareDan Circle｜管理者ページ</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; font-size: 14px; background: #f8f0f5; color: #222; min-height: 100vh; }

/* ログイン画面 */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.login-card { background: #fff; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
.login-logo { font-family: 'Great Vibes', cursive; font-size: 36px; color: #222; margin-bottom: 6px; }
.login-sub { font-size: 12px; color: #aaa; margin-bottom: 28px; }
.login-label { font-size: 12px; color: #777; margin-bottom: 6px; display: block; text-align: left; }
.login-input { width: 100%; border: 1px solid #e0e0e0; border-radius: 8px; padding: 11px 14px; font-size: 14px; color: #222; background: #fafafa; margin-bottom: 16px; }
.login-btn { background: linear-gradient(90deg, #f857a6 0%, #ff5f57 40%, #ffbe00 100%); color: #fff; border: none; border-radius: 32px; padding: 13px; font-size: 14px; cursor: pointer; width: 100%; font-weight: bold; }
.login-error { font-size: 12px; color: #e05a30; margin-top: 12px; display: none; }

/* 管理画面 */
.admin-wrap { display: none; max-width: 480px; margin: 0 auto; padding: 24px 16px; }
.admin-header { text-align: center; margin-bottom: 28px; }
.admin-logo { font-family: 'Great Vibes', cursive; font-size: 36px; color: #222; }
.admin-title { font-size: 12px; color: #aaa; margin-top: 4px; }

.admin-card { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.card-title { font-size: 14px; font-weight: bold; color: #222; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.card-sub { font-size: 11px; color: #aaa; margin-bottom: 20px; }
.badge { background: #fff0f8; color: #d0406a; font-size: 10px; padding: 3px 10px; border-radius: 20px; border: 1px solid #f4b8d8; }

/* 現在の画像プレビュー */
.current-img-wrap { border-radius: 10px; overflow: hidden; background: #fafafa; border: 1px solid #eee; min-height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
.current-img-wrap img { width: 100%; display: block; }
.no-img { text-align: center; padding: 24px; color: #ccc; font-size: 12px; line-height: 2; }

/* アップロードエリア */
.upload-area { border: 2px dashed #f4b8d8; border-radius: 12px; padding: 28px 20px; text-align: center; cursor: pointer; transition: background 0.2s; margin-bottom: 14px; }
.upload-area:hover { background: #fff5fb; }
.upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-text { font-size: 13px; color: #888; line-height: 1.8; }
.upload-text strong { color: #e05a9a; }
#file-input { display: none; }

.upload-btn { background: linear-gradient(90deg, #f857a6 0%, #ff5f57 100%); color: #fff; border: none; border-radius: 32px; padding: 13px; font-size: 14px; cursor: pointer; width: 100%; font-weight: bold; }
.delete-btn { background: #fff; color: #e05a30; border: 1px solid #f4b8d8; border-radius: 32px; padding: 11px; font-size: 13px; cursor: pointer; width: 100%; margin-top: 10px; }

.success-msg { display: none; background: #edfaf5; border: 1px solid #80ddb8; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #0a7a50; margin-top: 14px; text-align: center; }

/* ステータス */
.status-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
.status-row:last-child { border-bottom: none; }
.status-label { color: #888; }
.status-value { font-weight: bold; color: #222; }
.status-ok { color: #0a7a50; }
.status-none { color: #bbb; }

.logout-btn { background: #fff; color: #888; border: 1px solid #ddd; border-radius: 32px; padding: 10px; font-size: 13px; cursor: pointer; width: 100%; margin-top: 8px; }
.to-site-btn { display: block; text-align: center; background: #222; color: #fff; border-radius: 32px; padding: 13px; font-size: 14px; font-weight: bold; text-decoration: none; margin-bottom: 12px; }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">DareDan Circle</div>
    <div class="login-sub">管理者ページ</div>
    <label class="login-label">パスワード</label>
    <input class="login-input" type="password" id="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error">❌ パスワードが違います</div>
  </div>
</div>

<!-- 管理画面 -->
<div class="admin-wrap" id="admin-wrap">
  <div class="admin-header">
    <div class="admin-logo">DareDan Circle</div>
    <div class="admin-title">⚙️ 管理者ページ</div>
  </div>

  <!-- スケジュール更新カード -->
  <div class="admin-card">
    <div class="card-title">📅 スケジュール画像の更新 <span class="badge">月1回</span></div>
    <div class="card-sub">インスタ用に作った画像をそのままアップロードするだけでOKです</div>

    <div class="current-img-wrap" id="current-img-wrap">
      <img id="current-img" src="" alt="現在のスケジュール画像" style="display:none;" />
      <div class="no-img" id="no-img-msg">🗓️<br>まだ画像がアップロードされていません</div>
    </div>

    <div class="upload-area" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📷</div>
      <div class="upload-text">ここをタップして画像を選ぶ<br><strong>インスタ画像をそのまま使えます</strong><br><span style="font-size:11px;color:#bbb;">JPG・PNG・対応</span></div>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="uploadSchedule(event)" />

    <button class="upload-btn" onclick="document.getElementById('file-input').click()">📤 画像をアップロードして更新する</button>
    <button class="delete-btn" onclick="deleteSchedule()">🗑️ 現在の画像を削除する</button>

    <div class="success-msg" id="success-msg">✅ スケジュールを更新しました！<br>一般ページに反映されています。</div>
  </div>

  <!-- ステータスカード -->
  <div class="admin-card">
    <div class="card-title">📊 現在の状態</div>
    <div class="status-row">
      <span class="status-label">スケジュール画像</span>
      <span class="status-value" id="img-status">—</span>
    </div>
    <div class="status-row">
      <span class="status-label">最終更新</span>
      <span class="status-value" id="last-updated">—</span>
    </div>
  </div>

  <!-- ページリンク -->
  <a href="index.html" class="to-site-btn" target="_blank" onclick="window.open('index.html','_blank');return false;">🌐 一般ページを確認する</a>
  <button class="logout-btn" onclick="doLogout()">ログアウト</button>
</div>

<script>
const PASS = 'daredan2933';

function doLogin() {
  const val = document.getElementById('pw-input').value;
  if (val === PASS) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    loadStatus();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('admin-wrap').style.display = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}

function uploadSchedule(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    localStorage.setItem('daredan_schedule_img', dataUrl);
    localStorage.setItem('daredan_schedule_updated', new Date().toLocaleString('ja-JP'));
    showCurrentImg(dataUrl);
    document.getElementById('success-msg').style.display = 'block';
    setTimeout(() => { document.getElementById('success-msg').style.display = 'none'; }, 4000);
    loadStatus();
  };
  reader.readAsDataURL(file);
}

function deleteSchedule() {
  if (!confirm('スケジュール画像を削除しますか？')) return;
  localStorage.removeItem('daredan_schedule_img');
  localStorage.removeItem('daredan_schedule_updated');
  document.getElementById('current-img').style.display = 'none';
  document.getElementById('no-img-msg').style.display = 'block';
  loadStatus();
}

function showCurrentImg(src) {
  document.getElementById('current-img').src = src;
  document.getElementById('current-img').style.display = 'block';
  document.getElementById('no-img-msg').style.display = 'none';
}

function loadStatus() {
  const saved = localStorage.getItem('daredan_schedule_img');
  const updated = localStorage.getItem('daredan_schedule_updated');
  if (saved) {
    showCurrentImg(saved);
    document.getElementById('img-status').innerHTML = '<span class="status-ok">✅ アップロード済み</span>';
    document.getElementById('last-updated').textContent = updated || '—';
  } else {
    document.getElementById('img-status').innerHTML = '<span class="status-none">未アップロード</span>';
    document.getElementById('last-updated').textContent = '—';
  }
}
</script>
</body>
</html>
