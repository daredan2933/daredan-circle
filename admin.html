<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DareDan Circle｜管理者ページ</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; font-size: 14px; background: #f8f0f5; color: #222; min-height: 100vh; }

.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.login-card { background: #fff; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
.login-logo { font-family: "Great Vibes", cursive; font-size: 36px; color: #222; margin-bottom: 6px; }
.login-sub { font-size: 12px; color: #aaa; margin-bottom: 28px; }
.field-label { font-size: 11px; color: #888; text-align: left; margin-bottom: 4px; display: block; }
.login-input { width: 100%; border: 1px solid #e0e0e0; border-radius: 8px; padding: 11px 14px; font-size: 14px; color: #222; background: #fafafa; margin-bottom: 12px; }
.login-btn { background: linear-gradient(90deg, #f857a6 0%, #ff5f57 40%, #ffbe00 100%); color: #fff; border: none; border-radius: 32px; padding: 13px; font-size: 14px; cursor: pointer; width: 100%; font-weight: bold; }
.login-error { font-size: 12px; color: #e05a30; margin-top: 12px; display: none; }
.token-note { font-size: 11px; color: #aaa; text-align: left; margin-bottom: 12px; line-height: 1.6; }

.admin-wrap { display: none; max-width: 500px; margin: 0 auto; padding: 24px 16px; }
.admin-header { text-align: center; margin-bottom: 28px; }
.admin-logo { font-family: "Great Vibes", cursive; font-size: 36px; color: #222; }
.admin-title { font-size: 12px; color: #aaa; margin-top: 4px; }

.card { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.card-title { font-size: 15px; font-weight: bold; color: #222; margin-bottom: 16px; }

.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.cal-nav { background: none; border: 1px solid #eee; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 16px; color: #888; }
.cal-month { font-size: 15px; font-weight: bold; color: #222; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-day-label { text-align: center; font-size: 11px; color: #aaa; padding: 4px 0; }
.cal-day { text-align: center; padding: 8px 4px; border-radius: 8px; font-size: 13px; cursor: pointer; color: #222; }
.cal-day:hover { background: #fff0f8; color: #e05a9a; }
.cal-day.selected { background: linear-gradient(90deg, #f857a6, #ff5f57); color: #fff; font-weight: bold; }
.cal-day.empty { cursor: default; }
.cal-day.today { border: 1px solid #e05a9a; color: #e05a9a; }

.time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.time-btn { border: 1px solid #eee; border-radius: 8px; padding: 8px 4px; font-size: 12px; text-align: center; cursor: pointer; background: #fafafa; color: #555; }
.time-btn:hover { border-color: #e05a9a; color: #e05a9a; background: #fff0f8; }
.time-btn.selected { background: linear-gradient(90deg, #f857a6, #ff5f57); color: #fff; border-color: transparent; font-weight: bold; }

.place-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.place-btn { border: 1px solid #eee; border-radius: 8px; padding: 10px 8px; font-size: 13px; text-align: center; cursor: pointer; background: #fafafa; color: #555; }
.place-btn:hover { border-color: #e05a9a; color: #e05a9a; background: #fff0f8; }
.place-btn.selected { background: linear-gradient(90deg, #f857a6, #ff5f57); color: #fff; border-color: transparent; font-weight: bold; }
.place-input { width: 100%; border: 1px solid #eee; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #222; background: #fafafa; display: none; margin-top: 8px; }

.add-btn { width: 100%; background: linear-gradient(90deg, #f857a6, #ff5f57, #ffbe00); color: #fff; border: none; border-radius: 32px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 16px; }
.add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.lesson-list { display: flex; flex-direction: column; gap: 10px; }
.lesson-item { display: flex; align-items: center; justify-content: space-between; background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 12px 14px; }
.lesson-info { font-size: 13px; color: #222; line-height: 1.7; }
.lesson-date { font-weight: bold; color: #e05a9a; }
.del-btn { background: none; border: 1px solid #ffcccc; border-radius: 8px; color: #e05a30; font-size: 12px; padding: 4px 10px; cursor: pointer; flex-shrink: 0; }

.publish-btn { width: 100%; background: #222; color: #fff; border: none; border-radius: 32px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; }
.publish-btn:disabled { opacity: 0.5; }
.status-msg { text-align: center; font-size: 13px; margin-top: 12px; min-height: 20px; }
.status-ok { color: #0a7a50; }
.status-err { color: #e05a30; }
.logout-btn { width: 100%; background: #fff; color: #888; border: 1px solid #ddd; border-radius: 32px; padding: 10px; font-size: 13px; cursor: pointer; margin-top: 8px; }
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">DareDan Circle</div>
    <div class="login-sub">管理者ページ</div>
    <label class="field-label">パスワード</label>
    <input class="login-input" type="password" id="pw-input" placeholder="パスワードを入力" />
    <label class="field-label">GitHubトークン</label>
    <div class="token-note">⚠️ 毎回入力が必要です。トークンはブラウザに記憶させると便利です。</div>
    <input class="login-input" type="password" id="token-input" placeholder="ghp_で始まるトークンを入力" />
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error">❌ パスワードが違います</div>
  </div>
</div>

<div class="admin-wrap" id="admin-wrap">
  <div class="admin-header">
    <div class="admin-logo">DareDan Circle</div>
    <div class="admin-title">⚙️ 管理者ページ</div>
  </div>

  <div class="card">
    <div class="card-title">📅 レッスンを追加する</div>
    <div style="margin-bottom:16px;">
      <div style="font-size:12px;color:#aaa;margin-bottom:8px;">① 日付を選択</div>
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="cal-month"></div>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div style="margin-bottom:16px;">
      <div style="font-size:12px;color:#aaa;margin-bottom:8px;">② 時間帯を選択</div>
      <div class="time-grid" id="time-grid"></div>
    </div>
    <div style="margin-bottom:8px;">
      <div style="font-size:12px;color:#aaa;margin-bottom:8px;">③ 場所を選択</div>
      <div class="place-grid">
        <div class="place-btn" onclick="selectPlace(this, '金沢総体')">金沢総体</div>
        <div class="place-btn" onclick="selectPlace(this, '憩いの家')">憩いの家</div>
        <div class="place-btn" onclick="selectPlace(this, '額谷ふれあい')">額谷ふれあい</div>
        <div class="place-btn" onclick="selectPlace(this, 'other')">その他</div>
      </div>
      <input class="place-input" id="place-other-input" type="text" placeholder="場所を入力してください" oninput="otherPlaceInput(this.value)" />
    </div>
    <div style="font-size:12px;color:#aaa;margin-bottom:4px;" id="selected-summary"></div>
    <button class="add-btn" id="add-btn" onclick="addLesson()" disabled>＋ レッスンを追加</button>
  </div>

  <div class="card">
    <div class="card-title">📋 登録済みレッスン <span id="lesson-count" style="font-size:12px;color:#aaa;font-weight:normal;"></span></div>
    <div class="lesson-list" id="lesson-list">
      <div style="font-size:13px;color:#ccc;text-align:center;padding:20px;">まだレッスンが登録されていません</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🌐 サイトに公開する</div>
    <div style="font-size:12px;color:#888;margin-bottom:16px;">「公開する」ボタンを押すとお客さんサイトに即時反映されます</div>
    <button class="publish-btn" id="publish-btn" onclick="publishSchedule()">🚀 公開する</button>
    <div class="status-msg" id="status-msg"></div>
  </div>

  <button class="logout-btn" onclick="doLogout()">ログアウト</button>
</div>

<script>
const PASS = 'daredan2933';
const REPO = 'daredan2933/daredan-circle';
const FILE_PATH = 'schedule.json';
let GITHUB_TOKEN = '';

let selectedDate = null;
let selectedTime = null;
let selectedPlace = null;
let lessons = [];
let currentYear, currentMonth;

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const token = document.getElementById('token-input').value.trim();
  if (pw !== PASS) {
    document.getElementById('login-error').textContent = '❌ パスワードが違います';
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  if (!token.startsWith('ghp_')) {
    document.getElementById('login-error').textContent = '❌ トークンが正しくありません（ghp_で始まる文字列を入力してください）';
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  GITHUB_TOKEN = token;
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('admin-wrap').style.display = 'block';
  init();
}

function doLogout() {
  GITHUB_TOKEN = '';
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('admin-wrap').style.display = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('token-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}

function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  renderCalendar();
  renderTimes();
  loadLessons();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-month').textContent = currentYear + '年 ' + monthNames[currentMonth];
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const dayLabels = ['日','月','火','水','木','金','土'];
  dayLabels.forEach(function(l) {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = l;
    grid.appendChild(el);
  });
  const first = new Date(currentYear, currentMonth, 1).getDay();
  const days = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();
  for (var i = 0; i < first; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }
  for (var d = 1; d <= days; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    const dateStr = currentYear + '-' + String(currentMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    if (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d) el.classList.add('today');
    if (selectedDate === dateStr) el.classList.add('selected');
    el.onclick = (function(ds, elem) { return function() { selectDate(ds, elem); }; })(dateStr, el);
    grid.appendChild(el);
  }
}

function selectDate(dateStr, el) {
  selectedDate = dateStr;
  document.querySelectorAll('.cal-day').forEach(function(d) { d.classList.remove('selected'); });
  el.classList.add('selected');
  updateSummary();
}

function renderTimes() {
  const grid = document.getElementById('time-grid');
  grid.innerHTML = '';
  for (var h = 10; h <= 23; h++) {
    (function(hour) {
      const btn = document.createElement('div');
      btn.className = 'time-btn';
      btn.textContent = hour + ':00';
      const t = hour + ':00';
      if (selectedTime === t) btn.classList.add('selected');
      btn.onclick = function() {
        document.querySelectorAll('.time-btn').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        selectedTime = t;
        updateSummary();
      };
      grid.appendChild(btn);
    })(h);
  }
}

function selectPlace(el, val) {
  document.querySelectorAll('.place-btn').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
  const otherInput = document.getElementById('place-other-input');
  if (val === 'other') {
    otherInput.style.display = 'block';
    selectedPlace = otherInput.value || null;
  } else {
    otherInput.style.display = 'none';
    selectedPlace = val;
  }
  updateSummary();
}

function otherPlaceInput(val) {
  selectedPlace = val || null;
  updateSummary();
}

function updateSummary() {
  const ok = selectedDate && selectedTime && selectedPlace;
  document.getElementById('add-btn').disabled = !ok;
  if (selectedDate || selectedTime || selectedPlace) {
    document.getElementById('selected-summary').textContent = '選択中：' + (selectedDate||'日付未選択') + ' ' + (selectedTime||'時間未選択') + ' ' + (selectedPlace||'場所未選択');
  }
}

function addLesson() {
  if (!selectedDate || !selectedTime || !selectedPlace) return;
  lessons.push({ date: selectedDate, time: selectedTime, place: selectedPlace });
  lessons.sort(function(a,b) { return (a.date+a.time) > (b.date+b.time) ? 1 : -1; });
  selectedDate = null; selectedTime = null; selectedPlace = null;
  document.querySelectorAll('.cal-day').forEach(function(d) { d.classList.remove('selected'); });
  document.querySelectorAll('.time-btn').forEach(function(b) { b.classList.remove('selected'); });
  document.querySelectorAll('.place-btn').forEach(function(b) { b.classList.remove('selected'); });
  document.getElementById('place-other-input').style.display = 'none';
  document.getElementById('place-other-input').value = '';
  document.getElementById('selected-summary').textContent = '';
  document.getElementById('add-btn').disabled = true;
  renderLessons();
}

function deleteLesson(i) {
  lessons.splice(i, 1);
  renderLessons();
}

function renderLessons() {
  const list = document.getElementById('lesson-list');
  document.getElementById('lesson-count').textContent = '(' + lessons.length + '件)';
  if (lessons.length === 0) {
    list.innerHTML = '<div style="font-size:13px;color:#ccc;text-align:center;padding:20px;">まだレッスンが登録されていません</div>';
    return;
  }
  const weekdays = ['日','月','火','水','木','金','土'];
  list.innerHTML = lessons.map(function(l, i) {
    const d = new Date(l.date + 'T00:00:00');
    const w = weekdays[d.getDay()];
    const parts = l.date.split('-');
    const label = parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日（' + w + '）';
    return '<div class="lesson-item"><div class="lesson-info"><span class="lesson-date">' + label + '</span><br>' + l.time + '　📍 ' + l.place + '</div><button class="del-btn" onclick="deleteLesson(' + i + ')">削除</button></div>';
  }).join('');
}

async function loadLessons() {
  try {
    const res = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + FILE_PATH, {
      headers: { 'Authorization': 'token ' + GITHUB_TOKEN, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.ok) {
      const data = await res.json();
      const content = JSON.parse(atob(data.content.replace(/
/g,'')));
      lessons = content.lessons || [];
      renderLessons();
    }
  } catch(e) { console.log('新規作成モード'); }
}

async function publishSchedule() {
  const btn = document.getElementById('publish-btn');
  const msg = document.getElementById('status-msg');
  btn.disabled = true;
  msg.textContent = '公開中...';
  msg.className = 'status-msg';
  try {
    let sha = null;
    const getRes = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + FILE_PATH, {
      headers: { 'Authorization': 'token ' + GITHUB_TOKEN, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (getRes.ok) {
      const getData = await getRes.json();
      sha = getData.sha;
    }
    const content = btoa(unescape(encodeURIComponent(JSON.stringify({ lessons: lessons }, null, 2))));
    const body = { message: 'スケジュール更新', content: content };
    if (sha) body.sha = sha;
    const putRes = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + FILE_PATH, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + GITHUB_TOKEN, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });
    if (putRes.ok) {
      msg.textContent = '✅ 公開しました！サイトに反映されました。';
      msg.className = 'status-msg status-ok';
    } else {
      throw new Error('公開失敗');
    }
  } catch(e) {
    msg.textContent = '❌ 公開に失敗しました。もう一度お試しください。';
    msg.className = 'status-msg status-err';
  }
  btn.disabled = false;
}
</script>
</body>
</html>
